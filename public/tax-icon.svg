<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0C040" />
      <stop offset="100%" stop-color="#C9A84C" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Navy -->
  <rect width="512" height="512" rx="120" fill="#0A0F1E" />
  
  <!-- Outer Decorative Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#1E2A3A" stroke-width="8" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#goldGradient)" stroke-width="4" stroke-dasharray="20 10" opacity="0.4" />
  
  <!-- Rupee Symbol -->
  <g transform="translate(130, 95)" fill="url(#goldGradient)" filter="url(#glow)">
    <path d="M 180 50 L 180 90 L 110 90 C 150 100 170 130 170 170 C 170 210 150 240 110 250 L 180 250 L 180 290 L 50 290 L 50 250 L 80 250 C 120 240 130 210 130 170 C 130 130 120 100 80 90 L 50 90 L 50 50 Z" />
    <path d="M 60 250 L 190 400 L 140 400 L 10 250 Z" />
  </g>
</svg>
